<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <title>Route 66 & Texas Trip 2026 · Chicago → Austin</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- PWA-Integration -->
  <link rel="manifest" href="manifest-2.webmanifest">
  <meta name="theme-color" content="#020617">

  <!-- Webfont -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <!-- Mapbox CSS -->
  <link href="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.css" rel="stylesheet">

  <style>
    :root {
      --bg: #020617;
      --bg-alt: #050816;
      --card: #0b1120;
      --accent: #fb923c;
      --accent-soft: rgba(251, 146, 60, 0.16);
      --text: #e9edf5;
      --muted: #9ca3b3;
      --border-soft: rgba(148, 163, 184, 0.35);
      --radius-lg: 16px;
      --radius-md: 12px;
      --radius-sm: 999px;
      --shadow-soft: 0 22px 55px rgba(15, 23, 42, 0.85);
      --shadow-subtle: 0 14px 34px rgba(15, 23, 42, 0.75);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "Inter", system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      background: radial-gradient(circle at top, #020617 0, #020617 45%, #020617 100%);
      color: var(--text);
      line-height: 1.7;
      -webkit-font-smoothing: antialiased;
    }

    a { color: inherit; text-decoration: none; }

    main {
      max-width: 1080px;
      margin: 0 auto;
      padding: 1.5rem 1.25rem 3rem;
      background: radial-gradient(circle at top, #020617 0, #020617 60%, #020617 100%);
    }

    section { margin-bottom: 3rem; }

    h1, h2, h3, h4 {
      font-weight: 600;
      letter-spacing: 0.02em;
    }

    h1 { font-size: 2.2rem; }
    h2 { font-size: 1.6rem; margin-bottom: 1rem; }
    h3 { font-size: 1.1rem; }
    h4 { font-size: 0.98rem; }

    .section-header { margin-bottom: 1.3rem; }

    .section-header p,
    .city-header p {
      color: var(--muted);
      font-size: 0.92rem;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.25rem 0.7rem;
      border-radius: var(--radius-sm);
      border: 1px solid rgba(148, 163, 184, 0.28);
      background: rgba(15, 23, 42, 0.85);
      color: var(--muted);
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.09em;
    }

    .pill-dot {
      width: 6px;
      height: 6px;
      border-radius: 999px;
      background: var(--accent);
      box-shadow: 0 0 0 4px var(--accent-soft);
    }

    .btn-row { display: flex; flex-wrap: wrap; gap: 0.75rem; }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.4rem;
      padding: 0.6rem 1.05rem;
      border-radius: 999px;
      font-size: 0.88rem;
      font-weight: 500;
      border: 1px solid transparent;
      cursor: pointer;
      transition: transform 0.15s ease, box-shadow 0.15s ease, background 0.15s ease, border-color 0.15s ease;
      box-shadow: var(--shadow-subtle);
    }

    .btn-primary {
      background: linear-gradient(135deg, #f97316, #fb923c);
      color: #0b1020;
      border-color: rgba(15, 23, 42, 0.85);
    }

    .btn-ghost {
      background: rgba(15, 23, 42, 0.9);
      color: var(--text);
      border-color: var(--border-soft);
    }

    .btn-outline {
      background: rgba(15, 23, 42, 0.9);
      color: var(--text);
      border-color: rgba(248, 250, 252, 0.7);
    }

    .btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 18px 35px rgba(15, 23, 42, 0.9);
    }

    .tag-row { display: flex; flex-wrap: wrap; gap: 0.4rem; margin-top: 0.75rem; }

    .tag {
      padding: 0.2rem 0.7rem;
      border-radius: 999px;
      font-size: 0.78rem;
      border: 1px solid rgba(148, 163, 184, 0.35);
      color: var(--muted);
      background: rgba(15, 23, 42, 0.9);
    }

    /* Hero */

    .hero { margin-bottom: 3rem; }

    .hero-inner {
      display: grid;
      gap: 1.8rem;
      border-radius: var(--radius-lg);
      padding: 1.75rem 1.4rem;
      background: radial-gradient(circle at top left, #111827 0, #020617 55%, #020617 100%);
      border: 1px solid rgba(148, 163, 184, 0.4);
      box-shadow: var(--shadow-soft);
    }

    .hero-copy h1 {
      font-size: 2.3rem;
      margin-top: 0.9rem;
      margin-bottom: 0.6rem;
    }

    .hero-sub {
      color: #a5b0c6;
      max-width: 40rem;
      font-size: 0.98rem;
    }

    .hero-meta {
      display: grid;
      gap: 0.5rem;
      margin: 1.1rem 0 1.3rem;
      font-size: 0.85rem;
    }

    .meta-label {
      display: block;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      font-size: 0.7rem;
      color: var(--muted);
    }

    .meta-value { display: block; color: var(--text); }

    .hero-panel { display: flex; align-items: stretch; }

    .hero-card {
      border-radius: var(--radius-md);
      background: radial-gradient(circle at top, #020617 0, #020617 70%);
      border: 1px solid rgba(148, 163, 184, 0.5);
      padding: 1rem 1.1rem;
      font-size: 0.9rem;
    }

    .hero-card h3 { font-size: 0.95rem; margin-bottom: 0.4rem; }

    .hero-card ul { list-style: none; }

    .hero-card li {
      position: relative;
      padding-left: 1.1rem;
      color: var(--muted);
      margin-bottom: 0.2rem;
    }

    .hero-card li::before {
      content: "•";
      position: absolute;
      left: 0;
      color: var(--accent);
    }

    /* Fahrplan / Day Cards */

    .schedule-grid {
      display: grid;
      grid-template-columns: minmax(0, 1fr);
      gap: 1rem;
    }

    .day-card {
      position: relative;
      border-radius: var(--radius-md);
      padding: 0.9rem 1.1rem 1rem 1.15rem;
      background: var(--card);
      border: 1px solid rgba(148, 163, 184, 0.45);
      box-shadow: var(--shadow-subtle);
      font-size: 0.9rem;
      overflow: hidden;
      transition: transform 0.15s ease, box-shadow 0.15s ease, border-color 0.15s ease, background 0.15s ease;
    }

    .day-card::before {
      content: "";
      position: absolute;
      inset: 0;
      width: 3px;
      left: 0;
      top: 0;
      bottom: 0;
      background: linear-gradient(to bottom, var(--accent), transparent);
      opacity: 0.9;
    }

    .day-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 20px 40px rgba(15, 23, 42, 0.9);
      border-color: rgba(248, 250, 252, 0.7);
    }

    .day-card header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.35rem;
    }

    .day-date {
      font-size: 0.85rem;
      color: var(--muted);
    }

    .day-tag {
      display: inline-flex;
      align-items: center;
      padding: 0.1rem 0.55rem;
      margin-left: 0.45rem;
      border-radius: 999px;
      font-size: 0.7rem;
      border: 1px solid rgba(148, 163, 184, 0.5);
      background: rgba(15, 23, 42, 0.9);
      color: var(--muted);
    }

    .day-icon { font-size: 1rem; opacity: 0.9; }

    .day-card h3 {
      font-size: 1rem;
      margin: 0.25rem 0 0.2rem;
    }

    .times, .distance {
      font-size: 0.85rem;
      color: #9ca3b8;
    }

    .stops {
      list-style: none;
      margin-top: 0.45rem;
    }

    .stops li {
      position: relative;
      padding-left: 1rem;
      margin-bottom: 0.2rem;
      color: var(--muted);
    }

    .stops li::before {
      content: "•";
      position: absolute;
      left: 0;
      top: 0;
      color: var(--accent);
    }

    .type-arrival {
      background: radial-gradient(circle at top left, rgba(251, 146, 60, 0.18), var(--card));
    }

    .type-arrival::before {
      background: linear-gradient(to bottom, #fbbf24, #f97316);
    }

    .type-city {
      background: radial-gradient(circle at top left, rgba(16, 185, 129, 0.16), var(--card));
    }

    .type-city::before {
      background: linear-gradient(to bottom, #22c55e, #16a34a);
    }

    .type-road {
      background: radial-gradient(circle at top left, rgba(59, 130, 246, 0.18), var(--card));
    }

    .type-road::before {
      background: linear-gradient(to bottom, #3b82f6, #1d4ed8);
    }

    .type-transfer {
      background: radial-gradient(circle at top left, rgba(192, 132, 252, 0.18), var(--card));
    }

    .type-transfer::before {
      background: linear-gradient(to bottom, #a855f7, #7c3aed);
    }

    .day-actions {
      margin-top: 0.55rem;
    }

    .day-map-link {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      padding: 0.25rem 0.7rem;
      border-radius: 999px;
      font-size: 0.8rem;
      border: 1px solid rgba(148, 163, 184, 0.55);
      background: rgba(15, 23, 42, 0.95);
      color: #e5e7eb;
      text-decoration: none;
    }

    .day-map-link span {
      font-size: 0.9rem;
    }

    .day-map-link:hover {
      border-color: rgba(248, 250, 252, 0.85);
      background: rgba(15, 23, 42, 1);
    }

    /* Timeline */

    .timeline { margin-top: 2.5rem; }

    .timeline-list {
      list-style: none;
      position: relative;
      padding-left: 0;
      margin-top: 0.5rem;
    }

    .timeline-list::before {
      content: "";
      position: absolute;
      left: 10px;
      top: 0;
      bottom: 0;
      width: 2px;
      background: linear-gradient(to bottom, rgba(148, 163, 184, 0.6), rgba(148, 163, 184, 0.1));
    }

    .timeline-item {
      position: relative;
      padding-left: 2.2rem;
      margin-bottom: 0.9rem;
    }

    .timeline-dot {
      position: absolute;
      left: 4px;
      top: 0.2rem;
      width: 12px;
      height: 12px;
      border-radius: 999px;
      background: var(--bg);
      border: 2px solid var(--accent);
      box-shadow: 0 0 0 4px var(--accent-soft);
    }

    .timeline-date {
      font-size: 0.8rem;
      color: #9ca3b8;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    .timeline-title {
      font-size: 0.96rem;
      color: var(--text);
    }

    .timeline-meta {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      margin-top: 0.1rem;
    }

    .timeline-icon { font-size: 0.9rem; }

    .timeline-tag {
      font-size: 0.78rem;
      padding: 0.1rem 0.5rem;
      border-radius: 999px;
      border: 1px solid rgba(148, 163, 184, 0.45);
      background: rgba(15, 23, 42, 0.95);
      color: #a5b0c6;
    }

    .timeline-arrival .timeline-dot {
      border-color: #fbbf24;
      box-shadow: 0 0 0 4px rgba(251, 191, 36, 0.22);
    }

    .timeline-city .timeline-dot {
      border-color: #22c55e;
      box-shadow: 0 0 0 4px rgba(34, 197, 94, 0.22);
    }

    .timeline-road .timeline-dot {
      border-color: #3b82f6;
      box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.22);
    }

    .timeline-transfer .timeline-dot {
      border-color: #a855f7;
      box-shadow: 0 0 0 4px rgba(168, 85, 247, 0.22);
    }

    /* Legende Tagtypen */

    .legend { margin-top: 1.5rem; margin-bottom: 1rem; }

    .legend-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr);
      gap: 0.7rem;
    }

    .legend-item {
      display: flex;
      gap: 0.6rem;
      align-items: flex-start;
      padding: 0.55rem 0.7rem;
      border-radius: 10px;
      background: rgba(15, 23, 42, 0.9);
      border: 1px solid rgba(148, 163, 184, 0.45);
      font-size: 0.85rem;
    }

    .legend-dot {
      display: inline-flex;
      width: 26px;
      height: 26px;
      align-items: center;
      justify-content: center;
      border-radius: 999px;
      background: rgba(15, 23, 42, 0.9);
    }

    .legend-item p { color: var(--muted); }

    /* Interaktive Karte */

    .map-section { margin-top: 2.5rem; }

    .map-shell {
      border-radius: var(--radius-lg);
      background: var(--card);
      border: 1px solid rgba(148, 163, 184, 0.45);
      box-shadow: var(--shadow-soft);
      overflow: hidden;
    }

    .map-controls {
      padding: 0.7rem 0.9rem 0.5rem;
      border-bottom: 1px solid rgba(148, 163, 184, 0.35);
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      align-items: center;
    }

    .map-filters-label {
      font-size: 0.82rem;
      text-transform: uppercase;
      letter-spacing: 0.11em;
      color: var(--muted);
    }

    .map-filters {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
    }

    .map-filter {
      padding: 0.15rem 0.6rem;
      border-radius: 999px;
      border: 1px solid rgba(148, 163, 184, 0.5);
      background: rgba(15, 23, 42, 0.9);
      font-size: 0.8rem;
      color: var(--muted);
      cursor: pointer;
    }

    .map-filter.active {
      background: var(--accent);
      color: #0b1020;
      border-color: rgba(248, 250, 252, 0.8);
    }

    .map-filters-selects {
      margin-left: auto;
      display: flex;
      gap: 0.4rem;
    }

    .map-select {
      background: rgba(15, 23, 42, 0.95);
      border-radius: 999px;
      border: 1px solid rgba(148, 163, 184, 0.5);
      color: var(--muted);
      font-size: 0.8rem;
      padding: 0.25rem 0.6rem;
    }

    .map-wrapper {
      position: relative;
      height: 420px;
    }

    #trip-map {
      width: 100%;
      height: 100%;
    }

    .map-legend {
      position: absolute;
      right: 10px;
      bottom: 10px;
      background: rgba(15, 23, 42, 0.95);
      border-radius: 10px;
      border: 1px solid rgba(148, 163, 184, 0.4);
      padding: 0.4rem 0.6rem;
      font-size: 0.75rem;
      color: var(--muted);
    }

    .map-legend-row {
      display: flex;
      align-items: center;
      gap: 0.3rem;
      margin-bottom: 0.15rem;
    }

    .map-marker-dot {
      width: 10px;
      height: 10px;
      border-radius: 999px;
    }

    .map-marker-highlight { background: #f97316; }
    .map-marker-music { background: #22c55e; }
    .map-marker-food { background: #ef4444; }
    .map-marker-hidden { background: #3b82f6; }

    /* Städte */

    .cities { margin-top: 2.5rem; }

    .city { margin-bottom: 1.8rem; }

    .city-header h3 { font-size: 1.15rem; }

    .city-grid {
      display: grid;
      grid-template-columns: minmax(0, 1fr);
      gap: 0.8rem;
      margin-top: 0.7rem;
    }

    .city-card {
      background: var(--card);
      border-radius: var(--radius-md);
      border: 1px solid rgba(148, 163, 184, 0.45);
      padding: 0.8rem 0.9rem;
      font-size: 0.9rem;
      box-shadow: var(--shadow-subtle);
    }

    .city-card h4 {
      font-size: 0.9rem;
      margin-bottom: 0.35rem;
    }

    .city-card ul { list-style: none; }

    .city-card li {
      position: relative;
      padding-left: 1rem;
      margin-bottom: 0.1rem;
      color: #9ca3b8;
    }

    .city-card li::before {
      content: "–";
      position: absolute;
      left: 0;
      color: var(--accent);
    }

    .city-card a {
      text-decoration: none;
      color: inherit;
    }

    .city-card a:hover {
      text-decoration: underline;
    }

    /* Hotels */

    .hotels { margin-top: 2.5rem; }

    .hotel-row {
      display: flex;
      gap: 0.9rem;
      overflow-x: auto;
      padding-bottom: 0.4rem;
      scroll-snap-type: x mandatory;
    }

    .hotel-card {
      min-width: 190px;
      padding: 0.8rem 0.9rem;
      border-radius: var(--radius-md);
      background: var(--card);
      border: 1px solid rgba(148, 163, 184, 0.4);
      box-shadow: var(--shadow-subtle);
      font-size: 0.9rem;
      flex-shrink: 0;
      scroll-snap-align: start;
    }

    .hotel-card h3 { font-size: 0.95rem; }

    .hotel-card p { margin: 0.25rem 0 0.4rem; }

    .hotel-card a:hover { text-decoration: underline; }

    @media (min-width: 760px) {
      .city-grid {
        grid-template-columns: repeat(4, minmax(0, 1fr));
      }
      .legend-row {
        grid-template-columns: repeat(4, minmax(0, 1fr));
      }
    }

    @media (min-width: 800px) {
      .schedule-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (min-width: 900px) {
      main { padding-top: 2.5rem; }

      .hero-inner {
        grid-template-columns: minmax(0, 2.1fr) minmax(0, 1.3fr);
        padding: 2rem 2rem 2.2rem;
      }

      .hero-copy h1 { font-size: 2.35rem; }

      .hero-meta {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }
    }
  </style>
</head>
<body>

<main>
  <!-- Hier kommt dein kompletter Inhalt (Hero, Timeline, Fahrplan, Städte, Hotels) so wie in der letzten Version;
       den habe ich inhaltlich nicht geändert, nur das Map-Skript unten. -->
</main>

<!-- Mapbox JS -->
<script src="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.js"></script>

<script>
  mapboxgl.accessToken = 'pk.eyJ1IjoiaGVpa29kdWVtaWciLCJhIjoiY21vY293MGI5MDJ0ajJwcXpvdHp0ejUzcyJ9.bpqIqbfmBUeekHSWrwUxzQ';

  const poiData = [
    // … dein komplettes POI-Array aus der letzten Version (unverändert) …
  ];

  const categoryColors = {
    highlight: '#f97316',
    music: '#22c55e',
    food: '#ef4444',
    hidden: '#3b82f6'
  };

  const map = new mapboxgl.Map({
    container: 'trip-map',
    style: 'mapbox://styles/mapbox/dark-v11',
    center: [-95.0, 36.0],
    zoom: 4
  });

  map.addControl(new mapboxgl.NavigationControl(), 'top-right');

  let currentCategory = 'all';
  let currentCity = 'all';
  const markers = [];

  function clearMarkers() {
    markers.forEach(m => m.remove());
    markers.length = 0;
  }

  function applyFilters() {
    clearMarkers();
    poiData.forEach(poi => {
      if ((currentCategory === 'all' || poi.category === currentCategory) &&
          (currentCity === 'all' || poi.city === currentCity)) {

        const el = document.createElement('div');
        el.style.width = '12px';
        el.style.height = '12px';
        el.style.borderRadius = '999px';
        el.style.backgroundColor = categoryColors[poi.category] || '#e5e7eb';
        el.style.boxShadow = '0 0 0 4px rgba(15,23,42,0.9)';
        el.style.cursor = 'pointer';

        const popupHtml = `
          <div style="font-family:system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
                      font-size:13px; color:#020617; line-height:1.4;">
            <strong style="color:#020617;">${poi.name}</strong><br/>
            <span style="font-size:11px; color:#111827;">
              Kategorie: ${poi.category.toUpperCase()}
            </span><br/>
            <a href="${poi.url}"
               target="_blank"
               rel="noopener"
               style="display:inline-block; margin-top:4px;
                      font-size:12px; color:#1d4ed8; text-decoration:underline;">
              In Google Maps öffnen
            </a>
          </div>
        `;

        const marker = new mapboxgl.Marker(el)
          .setLngLat(poi.coordinates)
          .setPopup(
            new mapboxgl.Popup({ offset: 12 })
              .setHTML(popupHtml)
          )
          .addTo(map);

        markers.push(marker);
      }
    });
  }

  map.on('load', applyFilters);

  document.querySelectorAll('.map-filter').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.map-filter').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentCategory = btn.getAttribute('data-category');
      applyFilters();
    });
  });

  document.getElementById('city-filter').addEventListener('change', e => {
    currentCity = e.target.value;
    applyFilters();
  });
</script>

<script src="service-worker-3.js"></script>
</body>
</html>
